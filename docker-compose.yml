services:
  sing-box:
    #image: cary17/sing-box:latest
    image: ghcr.io/cary17/sing-box:latest
    container_name: sing-box
    privileged: true
    restart: always
    network_mode: "host"
    environment:
      TZ: Asia/Shanghai
    cap_add:
      - ALL
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - /opt/sing-box/conf:/etc/sing-box/
      #- /run/dbus:/run/dbus:ro
    command: -D /var/lib/sing-box -C /etc/sing-box/ run
