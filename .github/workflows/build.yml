name: Build reF1nd Sing-Box Docker Images

on:
  schedule:
    # Every 1 hours.
    - cron: "0 */1 * * *"
  workflow_dispatch:
    inputs:
      force_build:
        description: "т╝║тѕХТъёт╗║"
        required: false
        default: false
        type: boolean
      branch:
        description: "жђЅТІЕтѕєТћ»"
        required: false
        default: "both"
        type: choice
        options:
          - both
          - stable
          - testing

permissions:
  contents: write
  packages: write

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: false

env:
  # СИіТИИС╗Њт║ЊжЁЇуй«
  UPSTREAM_REPO: "https://github.com/reF1nd/sing-box.git"
  UPSTREAM_STABLE_BRANCH: "reF1nd-stable"
  UPSTREAM_TESTING_BRANCH: "reF1nd-testing"
  UPSTREAM_RELEASES_REPO: "reF1nd/sing-box-releases"
  UPSTREAM_SOURCE_REPO: "reF1nd/sing-box"

  # жЋютЃЈС╗Њт║ЊжЁЇуй«
  GHCR_IMAGE: "ghcr.io/${{ github.repository_owner }}/sing-box"
  DOCKERHUB_IMAGE: "cary17/sing-box"

jobs:
  # ==================== ТБђТхІуЅѕТю?====================
  check_versions:
    name: ТБђТхІСИіТИИуЅѕТю?    runs-on: ubuntu-latest
    outputs:
      stable_version: ${{ steps.stable_version.outputs.version }}
      stable_published_at: ${{ steps.stable_version.outputs.published_at }}
      stable_docker_tag: ${{ steps.stable_version.outputs.docker_tag }}
      testing_version: ${{ steps.testing_version.outputs.version }}
      testing_published_at: ${{ steps.testing_version.outputs.published_at }}
      testing_docker_tag: ${{ steps.testing_version.outputs.docker_tag }}
      stable_need_build: ${{ steps.stable_check.outputs.need_build }}
      testing_need_build: ${{ steps.testing_check.outputs.need_build }}
    steps:
      - name: Checkout Current Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: УјитЈќуе│т«џуЅѕуЅѕТюгтЈи
        id: stable_version
        run: |
          RELEASES_JSON="$RUNNER_TEMP/stable-releases.json"
          TAGS_JSON="$RUNNER_TEMP/stable-tags.json"
          TAG_PUBLISHED_AT="$(TZ=Asia/Shanghai date +'%Y-%m-%dT%H:%M:%S+08:00')"

          curl -fsSL \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ github.token }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ env.UPSTREAM_RELEASES_REPO }}/releases?per_page=100" \
            -o "$RELEASES_JSON"

          curl -fsSL \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ github.token }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ env.UPSTREAM_SOURCE_REPO }}/tags?per_page=100" \
            -o "$TAGS_JSON"

          SELECTED="$(bash scripts/select-upstream-version.sh stable "$RELEASES_JSON" "$TAGS_JSON" "$TAG_PUBLISHED_AT")"
          VERSION="$(jq -r '.version' <<< "$SELECTED")"
          PUBLISHED_AT="$(jq -r '.published_at' <<< "$SELECTED")"
          DOCKER_TAG="$(jq -r '.docker_tag' <<< "$SELECTED")"
          SOURCE="$(jq -r '.source' <<< "$SELECTED")"

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "published_at=${PUBLISHED_AT}" >> "$GITHUB_OUTPUT"
          echo "docker_tag=${DOCKER_TAG}" >> "$GITHUB_OUTPUT"
          echo "stable upstream version: ${VERSION}"
          echo "stable upstream published at: ${PUBLISHED_AT}"
          echo "stable upstream source: ${SOURCE}"
          echo "stable Docker tag: ${DOCKER_TAG}"

      - name: У»╗тЈќуе│т«џуЅѕУ«░тй?        id: stable_local
        run: |
          RECORD_FILE=".github/version/stable.json"

          if [ -f "$RECORD_FILE" ]; then
            VERSION=$(jq -r '.version // ""' "$RECORD_FILE")
            PUBLISHED_AT=$(jq -r '.published_at // ""' "$RECORD_FILE")
          else
            VERSION=""
            PUBLISHED_AT=""
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "published_at=${PUBLISHED_AT}" >> "$GITHUB_OUTPUT"

      - name: ТБђТЪЦуе│т«џуЅѕТў»тљджюђУдЂТъёт╗?        id: stable_check
        run: |
          NEED="false"
          SELECTED_BRANCH="${{ github.event.inputs.branch || 'both' }}"
          CURRENT="${{ steps.stable_version.outputs.version }}"
          CURRENT_PUBLISHED_AT="${{ steps.stable_version.outputs.published_at }}"
          LOCAL="${{ steps.stable_local.outputs.version }}"
          LOCAL_PUBLISHED_AT="${{ steps.stable_local.outputs.published_at }}"

          version_gt() {
            [[ -z "$2" ]] && return 0
            [[ "$1" == "$2" ]] && return 1

            version_key() {
              local tag="${1#v}"
              tag="${tag#V}"
              local base="${tag%%-reF1nd*}"
              local suffix="${tag#*-reF1nd}"
              local version_part prerelease_part major minor patch prerelease_number revision

              if [[ "$base" == *-* ]]; then
                version_part="${base%%-*}"
                prerelease_part="${base#*-}"
                prerelease_number="${prerelease_part##*.}"
                [[ "$prerelease_number" =~ ^[0-9]+$ ]] || prerelease_number=0
              else
                version_part="$base"
                prerelease_number=99999999
              fi

              IFS=. read -r major minor patch _ <<< "$version_part"
              if [[ "$suffix" == "$tag" || -z "$suffix" ]]; then
                revision=0
              else
                revision="${suffix#.}"
                [[ "$revision" =~ ^[0-9]+$ ]] || revision=0
              fi

              printf '%08d.%08d.%08d.%08d.%08d' "${major:-0}" "${minor:-0}" "${patch:-0}" "${prerelease_number:-0}" "${revision:-0}"
            }

            [[ "$(version_key "$1")" > "$(version_key "$2")" ]]
          }

          if [[ "$SELECTED_BRANCH" != "both" && "$SELECTED_BRANCH" != "stable" ]]; then
            echo "ТЅІтіеУДдтЈЉжђЅТІЕС║?${SELECTED_BRANCH}№╝їУи│У┐Єуе│т«џуЅѕ"
          elif [[ "${{ github.event.inputs.force_build }}" == "true" ]]; then
            NEED="true"
            echo "т╝║тѕХТъёт╗║уе│т«џуЅ?
          elif version_gt "$CURRENT" "$LOCAL"; then
            NEED="true"
            echo "ТБђТхІтѕ░уе│т«џуЅѕТќ░уЅѕТюг"
            echo "У┐юуеІ: $CURRENT"
            echo "Тюгтю░: $LOCAL"
          elif [[ "$CURRENT" == "$LOCAL" && ( -z "$LOCAL_PUBLISHED_AT" || "$CURRENT_PUBLISHED_AT" > "$LOCAL_PUBLISHED_AT" ) ]]; then
            NEED="true"
            echo "ТБђТхІтѕ░уе│т«џуЅѕтљїуЅѕТюгжЄЇТќ░тЈЉтИЃ"
            echo "У┐юуеІтЈЉтИЃТЌХжЌ┤: $CURRENT_PUBLISHED_AT"
            echo "Тюгтю░У«░тйЋтЈЉтИЃТЌХжЌ┤: $LOCAL_PUBLISHED_AT"
          elif [[ "$CURRENT" != "$LOCAL" ]]; then
            echo "уе│т«џуЅѕУ┐юуеІуЅѕТюгСИЇТў»ТЏ┤Тќ░уЅѕТюг№╝їУи│У┐ЄТъёт╗║"
            echo "У┐юуеІ: $CURRENT (${CURRENT_PUBLISHED_AT})"
            echo "Тюгтю░: $LOCAL (${LOCAL_PUBLISHED_AT})"
          fi

          echo "need_build=${NEED}" >> "$GITHUB_OUTPUT"

      - name: УјитЈќТхІУ»ЋуЅѕуЅѕТюгтЈи
        id: testing_version
        run: |
          RELEASES_JSON="$RUNNER_TEMP/testing-releases.json"
          TAGS_JSON="$RUNNER_TEMP/testing-tags.json"
          TAG_PUBLISHED_AT="$(TZ=Asia/Shanghai date +'%Y-%m-%dT%H:%M:%S+08:00')"

          curl -fsSL \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ github.token }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ env.UPSTREAM_RELEASES_REPO }}/releases?per_page=100" \
            -o "$RELEASES_JSON"

          curl -fsSL \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ github.token }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ env.UPSTREAM_SOURCE_REPO }}/tags?per_page=100" \
            -o "$TAGS_JSON"

          SELECTED="$(bash scripts/select-upstream-version.sh testing "$RELEASES_JSON" "$TAGS_JSON" "$TAG_PUBLISHED_AT")"
          VERSION="$(jq -r '.version' <<< "$SELECTED")"
          PUBLISHED_AT="$(jq -r '.published_at' <<< "$SELECTED")"
          DOCKER_TAG="$(jq -r '.docker_tag' <<< "$SELECTED")"
          SOURCE="$(jq -r '.source' <<< "$SELECTED")"

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "published_at=${PUBLISHED_AT}" >> "$GITHUB_OUTPUT"
          echo "docker_tag=${DOCKER_TAG}" >> "$GITHUB_OUTPUT"
          echo "testing upstream version: ${VERSION}"
          echo "testing upstream published at: ${PUBLISHED_AT}"
          echo "testing upstream source: ${SOURCE}"
          echo "testing Docker tag: ${DOCKER_TAG}"

      - name: У»╗тЈќТхІУ»ЋуЅѕУ«░тй?        id: testing_local
        run: |
          RECORD_FILE=".github/version/testing.json"

          if [ -f "$RECORD_FILE" ]; then
            VERSION=$(jq -r '.version // ""' "$RECORD_FILE")
            PUBLISHED_AT=$(jq -r '.published_at // ""' "$RECORD_FILE")
          else
            VERSION=""
            PUBLISHED_AT=""
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "published_at=${PUBLISHED_AT}" >> "$GITHUB_OUTPUT"

      - name: ТБђТЪЦТхІУ»ЋуЅѕТў»тљджюђУдЂТъёт╗?        id: testing_check
        run: |
          NEED="false"
          SELECTED_BRANCH="${{ github.event.inputs.branch || 'both' }}"
          CURRENT="${{ steps.testing_version.outputs.version }}"
          CURRENT_PUBLISHED_AT="${{ steps.testing_version.outputs.published_at }}"
          LOCAL="${{ steps.testing_local.outputs.version }}"
          LOCAL_PUBLISHED_AT="${{ steps.testing_local.outputs.published_at }}"

          version_gt() {
            [[ -z "$2" ]] && return 0
            [[ "$1" == "$2" ]] && return 1

            version_key() {
              local tag="${1#v}"
              tag="${tag#V}"
              local base="${tag%%-reF1nd*}"
              local suffix="${tag#*-reF1nd}"
              local version_part prerelease_part major minor patch prerelease_number revision

              if [[ "$base" == *-* ]]; then
                version_part="${base%%-*}"
                prerelease_part="${base#*-}"
                prerelease_number="${prerelease_part##*.}"
                [[ "$prerelease_number" =~ ^[0-9]+$ ]] || prerelease_number=0
              else
                version_part="$base"
                prerelease_number=99999999
              fi

              IFS=. read -r major minor patch _ <<< "$version_part"
              if [[ "$suffix" == "$tag" || -z "$suffix" ]]; then
                revision=0
              else
                revision="${suffix#.}"
                [[ "$revision" =~ ^[0-9]+$ ]] || revision=0
              fi

              printf '%08d.%08d.%08d.%08d.%08d' "${major:-0}" "${minor:-0}" "${patch:-0}" "${prerelease_number:-0}" "${revision:-0}"
            }

            [[ "$(version_key "$1")" > "$(version_key "$2")" ]]
          }

          if [[ "$SELECTED_BRANCH" != "both" && "$SELECTED_BRANCH" != "testing" ]]; then
            echo "ТЅІтіеУДдтЈЉжђЅТІЕС║?${SELECTED_BRANCH}№╝їУи│У┐ЄТхІУ»ЋуЅѕ"
          elif [[ "${{ github.event.inputs.force_build }}" == "true" ]]; then
            NEED="true"
            echo "т╝║тѕХТъёт╗║ТхІУ»ЋуЅ?
          elif version_gt "$CURRENT" "$LOCAL"; then
            NEED="true"
            echo "ТБђТхІтѕ░ТхІУ»ЋуЅѕТќ░уЅѕТюг"
            echo "У┐юуеІ: $CURRENT"
            echo "Тюгтю░: $LOCAL"
          elif [[ "$CURRENT" == "$LOCAL" && ( -z "$LOCAL_PUBLISHED_AT" || "$CURRENT_PUBLISHED_AT" > "$LOCAL_PUBLISHED_AT" ) ]]; then
            NEED="true"
            echo "ТБђТхІтѕ░ТхІУ»ЋуЅѕтљїуЅѕТюгжЄЇТќ░тЈЉтИЃ"
            echo "У┐юуеІтЈЉтИЃТЌХжЌ┤: $CURRENT_PUBLISHED_AT"
            echo "Тюгтю░У«░тйЋтЈЉтИЃТЌХжЌ┤: $LOCAL_PUBLISHED_AT"
          elif [[ "$CURRENT" != "$LOCAL" ]]; then
            echo "ТхІУ»ЋуЅѕУ┐юуеІуЅѕТюгСИЇТў»ТЏ┤Тќ░уЅѕТюг№╝їУи│У┐ЄТъёт╗║"
            echo "У┐юуеІ: $CURRENT (${CURRENT_PUBLISHED_AT})"
            echo "Тюгтю░: $LOCAL (${LOCAL_PUBLISHED_AT})"
          fi

          echo "need_build=${NEED}" >> "$GITHUB_OUTPUT"

  # ==================== Тъёт╗║уе│т«џуЅ?====================
  build_stable:
    name: Тъёт╗║уе│т«џуЅѕжЋютЃ?    runs-on: ubuntu-latest
    needs: check_versions
    if: >-
      needs.check_versions.outputs.stable_need_build == 'true' &&
      (github.event_name != 'workflow_dispatch' || github.event.inputs.branch == 'both' || github.event.inputs.branch == 'stable')
    steps:
      - name: тЁІжџєСИіТИИС╗БуаЂ
        run: |
          echo "тЁІжџє ${{ env.UPSTREAM_STABLE_BRANCH }} тѕєТћ»..."
          git clone --depth 1 --branch ${{ env.UPSTREAM_STABLE_BRANCH }} \
            ${{ env.UPSTREAM_REPO }} src
          echo "С╗БуаЂтЁІжџєт«їТѕљ"

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: cary17
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Тъёт╗║т╣ХТјежђЂуе│т«џуЅѕтцџТъХТъёжЋютЃ?        uses: docker/build-push-action@v6
        with:
          context: src
          file: src/Dockerfile
          platforms: linux/amd64,linux/arm64,linux/386,linux/arm/v7,linux/arm/v6
          push: true
          cache-from: type=gha,scope=stable
          cache-to: type=gha,mode=max,scope=stable
          tags: |
            ${{ env.GHCR_IMAGE }}:${{ needs.check_versions.outputs.stable_docker_tag }}
            ${{ env.GHCR_IMAGE }}:latest
            ${{ env.GHCR_IMAGE }}:stable
            ${{ env.DOCKERHUB_IMAGE }}:${{ needs.check_versions.outputs.stable_docker_tag }}
            ${{ env.DOCKERHUB_IMAGE }}:latest
            ${{ env.DOCKERHUB_IMAGE }}:stable

      - name: Checkout Current Repo
        uses: actions/checkout@v4
        with:
          path: repo
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: ТЏ┤Тќ░уе│т«џуЅѕуЅѕТюгУ«░тй?        working-directory: repo
        run: |
          mkdir -p .github/version
          FILE=".github/version/stable.json"
          jq -n \
            --arg channel "stable" \
            --arg version "${{ needs.check_versions.outputs.stable_version }}" \
            --arg published_at "${{ needs.check_versions.outputs.stable_published_at }}" \
            --arg built_at "$(TZ=Asia/Shanghai date +'%Y-%m-%dT%H:%M:%S+08:00')" \
            --arg docker_tag "${{ needs.check_versions.outputs.stable_docker_tag }}" \
            '{
              channel: $channel,
              version: $version,
              published_at: $published_at,
              built_at: $built_at,
              docker_tag: $docker_tag
            }' > "$FILE"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$FILE"

          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "chore: update stable version [skip ci]"
            for attempt in 1 2 3; do
              git pull --rebase origin "${GITHUB_REF_NAME}"
              if git push; then
                exit 0
              fi
              echo "Push failed, retrying (${attempt}/3)..."
              sleep 5
            done
            exit 1
          fi

      - name: ТБђТЪЦуе│т«џуЅѕуЅѕТюгУ«░тйЋ
        working-directory: repo
        run: |
          EXPECTED="${{ needs.check_versions.outputs.stable_version }}"
          EXPECTED_PUBLISHED_AT="${{ needs.check_versions.outputs.stable_published_at }}"
          FILE=".github/version/stable.json"

          if [[ ! -f "$FILE" ]]; then
            echo "уЅѕТюгУ«░тйЋТќЄС╗ХСИЇтГўтю? $FILE"
            exit 1
          fi

          ACTUAL=$(jq -r '.version // ""' "$FILE")
          ACTUAL_PUBLISHED_AT=$(jq -r '.published_at // ""' "$FILE")
          ACTUAL_BUILT_AT=$(jq -r '.built_at // ""' "$FILE")
          if [[ "$ACTUAL" != "$EXPECTED" ]]; then
            echo "уЅѕТюгУ«░тйЋСИЇТГБуА?
            echo "ТюЪТюЏ: $EXPECTED"
            echo "т«ъжЎЁ: $ACTUAL"
            exit 1
          fi
          if [[ "$ACTUAL_PUBLISHED_AT" != "$EXPECTED_PUBLISHED_AT" ]]; then
            echo "СИіТИИтЈЉтИЃТЌХжЌ┤У«░тйЋСИЇТГБуА?
            echo "ТюЪТюЏ: $EXPECTED_PUBLISHED_AT"
            echo "т«ъжЎЁ: $ACTUAL_PUBLISHED_AT"
            exit 1
          fi
          if [[ -z "$ACTUAL_BUILT_AT" ]]; then
            echo "Тъёт╗║ТЌХжЌ┤У«░тйЋСИ║уЕ║"
            exit 1
          fi

          git fetch origin "${GITHUB_REF_NAME}"
          REMOTE=$(git show "origin/${GITHUB_REF_NAME}:${FILE}" 2>/dev/null || true)
          REMOTE_VERSION=$(jq -r '.version // ""' <<< "$REMOTE")
          REMOTE_PUBLISHED_AT=$(jq -r '.published_at // ""' <<< "$REMOTE")
          REMOTE_BUILT_AT=$(jq -r '.built_at // ""' <<< "$REMOTE")
          if [[ "$REMOTE_VERSION" != "$EXPECTED" || "$REMOTE_PUBLISHED_AT" != "$EXPECTED_PUBLISHED_AT" || -z "$REMOTE_BUILT_AT" ]]; then
            echo "У┐юуФ»уЅѕТюгУ«░тйЋСИЇТГБуА?
            echo "ТюЪТюЏ: $EXPECTED"
            echo "У┐юуФ»уЅѕТюг: $REMOTE_VERSION"
            echo "У┐юуФ»тЈЉтИЃТЌХжЌ┤: $REMOTE_PUBLISHED_AT"
            echo "У┐юуФ»Тъёт╗║ТЌХжЌ┤: $REMOTE_BUILT_AT"
            exit 1
          fi

          echo "уе│т«џуЅѕуЅѕТюгУ«░тйЋТаАжфїжђџУ┐Є: $EXPECTED ($EXPECTED_PUBLISHED_AT)"

      - name: Тъёт╗║ТЉўУдЂ
        run: |
          echo "## уе│т«џуЅѕТъёт╗║т«їТѕ? >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| жА╣уЏ« | С┐АТЂ» |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| СИіТИИуЅѕТюг | ${{ needs.check_versions.outputs.stable_version }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| СИіТИИтЈЉтИЃТЌХжЌ┤ | ${{ needs.check_versions.outputs.stable_published_at }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Docker tag | ${{ needs.check_versions.outputs.stable_docker_tag }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| ТъХТъё | amd64, arm64, 386, arm/v7, arm/v6 |" >> "$GITHUB_STEP_SUMMARY"
          echo "| GHCR | \`${{ env.GHCR_IMAGE }}:${{ needs.check_versions.outputs.stable_docker_tag }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| GHCR stable | \`${{ env.GHCR_IMAGE }}:stable\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Docker Hub | \`${{ env.DOCKERHUB_IMAGE }}:${{ needs.check_versions.outputs.stable_docker_tag }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Docker Hub stable | \`${{ env.DOCKERHUB_IMAGE }}:stable\` |" >> "$GITHUB_STEP_SUMMARY"

  # ==================== Тъёт╗║ТхІУ»ЋуЅ?====================
  build_testing:
    name: Тъёт╗║ТхІУ»ЋуЅѕжЋютЃ?    runs-on: ubuntu-latest
    needs: check_versions
    if: >-
      needs.check_versions.outputs.testing_need_build == 'true' &&
      (github.event_name != 'workflow_dispatch' || github.event.inputs.branch == 'both' || github.event.inputs.branch == 'testing')
    steps:
      - name: тЁІжџєСИіТИИС╗БуаЂ
        run: |
          echo "тЁІжџє ${{ env.UPSTREAM_TESTING_BRANCH }} тѕєТћ»..."
          git clone --depth 1 --branch ${{ env.UPSTREAM_TESTING_BRANCH }} \
            ${{ env.UPSTREAM_REPO }} src
          echo "С╗БуаЂтЁІжџєт«їТѕљ"

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: cary17
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Тъёт╗║т╣ХТјежђЂТхІУ»ЋуЅѕтцџТъХТъёжЋютЃ?        uses: docker/build-push-action@v6
        with:
          context: src
          file: src/Dockerfile
          platforms: linux/amd64,linux/arm64,linux/386,linux/arm/v7,linux/arm/v6
          push: true
          cache-from: type=gha,scope=testing
          cache-to: type=gha,mode=max,scope=testing
          tags: |
            ${{ env.GHCR_IMAGE }}:${{ needs.check_versions.outputs.testing_docker_tag }}
            ${{ env.GHCR_IMAGE }}:testing
            ${{ env.DOCKERHUB_IMAGE }}:${{ needs.check_versions.outputs.testing_docker_tag }}
            ${{ env.DOCKERHUB_IMAGE }}:testing

      - name: Checkout Current Repo
        uses: actions/checkout@v4
        with:
          path: repo
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: ТЏ┤Тќ░ТхІУ»ЋуЅѕуЅѕТюгУ«░тй?        working-directory: repo
        run: |
          mkdir -p .github/version
          FILE=".github/version/testing.json"
          jq -n \
            --arg channel "testing" \
            --arg version "${{ needs.check_versions.outputs.testing_version }}" \
            --arg published_at "${{ needs.check_versions.outputs.testing_published_at }}" \
            --arg built_at "$(TZ=Asia/Shanghai date +'%Y-%m-%dT%H:%M:%S+08:00')" \
            --arg docker_tag "${{ needs.check_versions.outputs.testing_docker_tag }}" \
            '{
              channel: $channel,
              version: $version,
              published_at: $published_at,
              built_at: $built_at,
              docker_tag: $docker_tag
            }' > "$FILE"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$FILE"

          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "chore: update testing version [skip ci]"
            for attempt in 1 2 3; do
              git pull --rebase origin "${GITHUB_REF_NAME}"
              if git push; then
                exit 0
              fi
              echo "Push failed, retrying (${attempt}/3)..."
              sleep 5
            done
            exit 1
          fi

      - name: ТБђТЪЦТхІУ»ЋуЅѕуЅѕТюгУ«░тйЋ
        working-directory: repo
        run: |
          EXPECTED="${{ needs.check_versions.outputs.testing_version }}"
          EXPECTED_PUBLISHED_AT="${{ needs.check_versions.outputs.testing_published_at }}"
          FILE=".github/version/testing.json"

          if [[ ! -f "$FILE" ]]; then
            echo "уЅѕТюгУ«░тйЋТќЄС╗ХСИЇтГўтю? $FILE"
            exit 1
          fi

          ACTUAL=$(jq -r '.version // ""' "$FILE")
          ACTUAL_PUBLISHED_AT=$(jq -r '.published_at // ""' "$FILE")
          ACTUAL_BUILT_AT=$(jq -r '.built_at // ""' "$FILE")
          if [[ "$ACTUAL" != "$EXPECTED" ]]; then
            echo "уЅѕТюгУ«░тйЋСИЇТГБуА?
            echo "ТюЪТюЏ: $EXPECTED"
            echo "т«ъжЎЁ: $ACTUAL"
            exit 1
          fi
          if [[ "$ACTUAL_PUBLISHED_AT" != "$EXPECTED_PUBLISHED_AT" ]]; then
            echo "СИіТИИтЈЉтИЃТЌХжЌ┤У«░тйЋСИЇТГБуА?
            echo "ТюЪТюЏ: $EXPECTED_PUBLISHED_AT"
            echo "т«ъжЎЁ: $ACTUAL_PUBLISHED_AT"
            exit 1
          fi
          if [[ -z "$ACTUAL_BUILT_AT" ]]; then
            echo "Тъёт╗║ТЌХжЌ┤У«░тйЋСИ║уЕ║"
            exit 1
          fi

          git fetch origin "${GITHUB_REF_NAME}"
          REMOTE=$(git show "origin/${GITHUB_REF_NAME}:${FILE}" 2>/dev/null || true)
          REMOTE_VERSION=$(jq -r '.version // ""' <<< "$REMOTE")
          REMOTE_PUBLISHED_AT=$(jq -r '.published_at // ""' <<< "$REMOTE")
          REMOTE_BUILT_AT=$(jq -r '.built_at // ""' <<< "$REMOTE")
          if [[ "$REMOTE_VERSION" != "$EXPECTED" || "$REMOTE_PUBLISHED_AT" != "$EXPECTED_PUBLISHED_AT" || -z "$REMOTE_BUILT_AT" ]]; then
            echo "У┐юуФ»уЅѕТюгУ«░тйЋСИЇТГБуА?
            echo "ТюЪТюЏ: $EXPECTED"
            echo "У┐юуФ»уЅѕТюг: $REMOTE_VERSION"
            echo "У┐юуФ»тЈЉтИЃТЌХжЌ┤: $REMOTE_PUBLISHED_AT"
            echo "У┐юуФ»Тъёт╗║ТЌХжЌ┤: $REMOTE_BUILT_AT"
            exit 1
          fi

          echo "ТхІУ»ЋуЅѕуЅѕТюгУ«░тйЋТаАжфїжђџУ┐Є: $EXPECTED ($EXPECTED_PUBLISHED_AT)"

      - name: Тъёт╗║ТЉўУдЂ
        run: |
          echo "## ТхІУ»ЋуЅѕТъёт╗║т«їТѕ? >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| жА╣уЏ« | С┐АТЂ» |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| СИіТИИуЅѕТюг | ${{ needs.check_versions.outputs.testing_version }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| СИіТИИтЈЉтИЃТЌХжЌ┤ | ${{ needs.check_versions.outputs.testing_published_at }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Docker tag | ${{ needs.check_versions.outputs.testing_docker_tag }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| ТъХТъё | amd64, arm64, 386, arm/v7, arm/v6 |" >> "$GITHUB_STEP_SUMMARY"
          echo "| GHCR | \`${{ env.GHCR_IMAGE }}:${{ needs.check_versions.outputs.testing_docker_tag }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| GHCR testing | \`${{ env.GHCR_IMAGE }}:testing\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Docker Hub | \`${{ env.DOCKERHUB_IMAGE }}:${{ needs.check_versions.outputs.testing_docker_tag }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Docker Hub testing | \`${{ env.DOCKERHUB_IMAGE }}:testing\` |" >> "$GITHUB_STEP_SUMMARY"
