name: Build reF1nd Sing-Box Docker Images

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:
    inputs:
      force_build:
        description: "强制构建"
        required: false
        default: false
        type: boolean
      branch:
        description: "选择分支"
        required: false
        default: "both"
        type: choice
        options:
          - both
          - stable
          - testing

env:
  UPSTREAM_REPO: "https://github.com/reF1nd/sing-box.git"
  UPSTREAM_STABLE_BRANCH: "reF1nd-stable"
  UPSTREAM_TESTING_BRANCH: "reF1nd-testing"
  GHCR_IMAGE: "ghcr.io/${{ github.repository_owner }}/sing-box"
  DOCKERHUB_IMAGE: "cary17/sing-box"

jobs:
  # ==================== 版本检测 ====================
  check_versions:
    name: 检测上游版本
    runs-on: ubuntu-latest
    outputs:
      stable_version: ${{ steps.stable_version.outputs.version }}
      testing_version: ${{ steps.testing_version.outputs.version }}
      stable_need_build: ${{ steps.stable_check.outputs.need_build }}
      testing_need_build: ${{ steps.testing_check.outputs.need_build }}
      stable_commit: ${{ steps.stable_commit.outputs.commit }}
      testing_commit: ${{ steps.testing_commit.outputs.commit }}
    steps:
      - name: 获取稳定版信息
        id: stable_commit
        run: |
          COMMIT=$(git ls-remote ${{ env.UPSTREAM_REPO }} \
            refs/heads/${{ env.UPSTREAM_STABLE_BRANCH }} | awk '{print $1}')
          echo "commit=${COMMIT}" >> $GITHUB_OUTPUT
          
      - name: 获取稳定版版本号
        id: stable_version
        run: |
          git clone --depth 1 --branch ${{ env.UPSTREAM_STABLE_BRANCH }} \
            ${{ env.UPSTREAM_REPO }} /tmp/stable
          cd /tmp/stable
          TAG=$(git describe --tags --abbrev=0 2>/dev/null | sed 's/-reF1nd$//' || echo "")
          if [[ -n "$TAG" ]]; then
            VERSION="$TAG"
          else
            VERSION="stable-$(git rev-parse --short HEAD)"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          
      - name: 检查稳定版是否需要构建
        id: stable_check
        run: |
          NEED="false"
          if [[ "${{ github.event.inputs.force_build }}" == "true" ]] || \
             [[ "${{ github.event.inputs.branch }}" == "stable" ]] || \
             [[ "${{ github.event.inputs.branch }}" == "both" ]]; then
            NEED="true"
          elif [[ -f ".last_stable_commit" ]]; then
            LAST=$(cat .last_stable_commit)
            CURRENT="${{ steps.stable_commit.outputs.commit }}"
            [[ "$CURRENT" != "$LAST" ]] && NEED="true"
          else
            NEED="true"
          fi
          echo "need_build=${NEED}" >> $GITHUB_OUTPUT
          
      - name: 获取测试版信息
        id: testing_commit
        run: |
          COMMIT=$(git ls-remote ${{ env.UPSTREAM_REPO }} \
            refs/heads/${{ env.UPSTREAM_TESTING_BRANCH }} | awk '{print $1}')
          echo "commit=${COMMIT}" >> $GITHUB_OUTPUT
          
      - name: 获取测试版版本号
        id: testing_version
        run: |
          git clone --depth 1 --branch ${{ env.UPSTREAM_TESTING_BRANCH }} \
            ${{ env.UPSTREAM_REPO }} /tmp/testing
          cd /tmp/testing
          TAG=$(git describe --tags --abbrev=0 2>/dev/null | sed 's/-reF1nd$//' || echo "")
          if [[ -n "$TAG" ]]; then
            VERSION="$TAG"
          else
            VERSION="$(git rev-parse --short HEAD)"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          
      - name: 检查测试版是否需要构建
        id: testing_check
        run: |
          NEED="false"
          if [[ "${{ github.event.inputs.force_build }}" == "true" ]] || \
             [[ "${{ github.event.inputs.branch }}" == "testing" ]] || \
             [[ "${{ github.event.inputs.branch }}" == "both" ]]; then
            NEED="true"
          elif [[ -f ".last_testing_commit" ]]; then
            LAST=$(cat .last_testing_commit)
            CURRENT="${{ steps.testing_commit.outputs.commit }}"
            [[ "$CURRENT" != "$LAST" ]] && NEED="true"
          else
            NEED="true"
          fi
          echo "need_build=${NEED}" >> $GITHUB_OUTPUT

  # ==================== 构建稳定版 - amd64 ====================
  build_stable_amd64:
    name: 构建稳定版 amd64
    runs-on: ubuntu-latest
    needs: check_versions
    if: needs.check_versions.outputs.stable_need_build == 'true'
    steps:
      - name: 克隆代码
        run: |
          git clone --depth 1 --branch ${{ env.UPSTREAM_STABLE_BRANCH }} \
            ${{ env.UPSTREAM_REPO }} .
          
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ~1.25.10
          
      - name: 编译二进制
        run: |
          VERSION="${{ needs.check_versions.outputs.stable_version }}"
          
          if [[ -f "release/DEFAULT_BUILD_TAGS_OTHERS" ]]; then
            TAGS=$(cat release/DEFAULT_BUILD_TAGS_OTHERS)
          else
            TAGS="with_gvisor,with_quic,with_wireguard,with_utls,with_acme,with_clash_api,with_stdjson,with_dhcp,with_v2ray_api,with_lite,with_ech"
          fi
          
          if [[ -f "release/LDFLAGS" ]]; then
            LDFLAGS=$(cat release/LDFLAGS)
          else
            LDFLAGS="-extldflags '-static'"
          fi
          
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go build -v -trimpath -o sing-box-amd64 \
            -tags "${TAGS}" \
            -ldflags "-X 'github.com/sagernet/sing-box/constant.Version=${VERSION}' ${LDFLAGS} -s -w -buildid=" \
            ./cmd/sing-box
          
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: cary17
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          
      - name: 构建并推送镜像
        run: |
          VERSION="${{ needs.check_versions.outputs.stable_version }}"
          
          docker build \
            --platform linux/amd64 \
            --build-arg TARGETARCH=amd64 \
            -t ${ARCH}-temp \
            -f Dockerfile.binary .
          
          docker tag amd64-temp "${{ env.GHCR_IMAGE }}:${VERSION}-amd64"
          docker push "${{ env.GHCR_IMAGE }}:${VERSION}-amd64"
          
          docker tag amd64-temp "cary17/sing-box:${VERSION}-amd64"
          docker push "cary17/sing-box:${VERSION}-amd64"
          
      - name: 保存镜像标签
        run: |
          echo "STABLE_AMD64_DONE=true" >> $GITHUB_ENV

  # ==================== 构建稳定版 - arm64（原生 ARM Runner）====================
  build_stable_arm64:
    name: 构建稳定版 arm64
    runs-on: ubuntu-24.04-arm
    needs: check_versions
    if: needs.check_versions.outputs.stable_need_build == 'true'
    steps:
      - name: 克隆代码
        run: |
          git clone --depth 1 --branch ${{ env.UPSTREAM_STABLE_BRANCH }} \
            ${{ env.UPSTREAM_REPO }} .
          
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ~1.25.10
          
      - name: 编译二进制
        run: |
          VERSION="${{ needs.check_versions.outputs.stable_version }}"
          
          if [[ -f "release/DEFAULT_BUILD_TAGS_OTHERS" ]]; then
            TAGS=$(cat release/DEFAULT_BUILD_TAGS_OTHERS)
          else
            TAGS="with_gvisor,with_quic,with_wireguard,with_utls,with_acme,with_clash_api,with_stdjson,with_dhcp,with_v2ray_api,with_lite,with_ech"
          fi
          
          if [[ -f "release/LDFLAGS" ]]; then
            LDFLAGS=$(cat release/LDFLAGS)
          else
            LDFLAGS="-extldflags '-static'"
          fi
          
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 \
            go build -v -trimpath -o sing-box-arm64 \
            -tags "${TAGS}" \
            -ldflags "-X 'github.com/sagernet/sing-box/constant.Version=${VERSION}' ${LDFLAGS} -s -w -buildid=" \
            ./cmd/sing-box
          
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: cary17
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          
      - name: 构建并推送镜像
        run: |
          VERSION="${{ needs.check_versions.outputs.stable_version }}"
          
          docker build \
            --platform linux/arm64 \
            --build-arg TARGETARCH=arm64 \
            -t arm64-temp \
            -f Dockerfile.binary .
          
          docker tag arm64-temp "${{ env.GHCR_IMAGE }}:${VERSION}-arm64"
          docker push "${{ env.GHCR_IMAGE }}:${VERSION}-arm64"
          
          docker tag arm64-temp "cary17/sing-box:${VERSION}-arm64"
          docker push "cary17/sing-box:${VERSION}-arm64"
          
      - name: 保存镜像标签
        run: |
          echo "STABLE_ARM64_DONE=true" >> $GITHUB_ENV

  # ==================== 构建稳定版 - 其他架构（使用 QEMU）====================
  build_stable_other:
    name: 构建稳定版 ${{ matrix.arch }}
    runs-on: ubuntu-latest
    needs: [check_versions, build_stable_amd64, build_stable_arm64]
    if: needs.check_versions.outputs.stable_need_build == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - { arch: 386, platform: linux/386, goarch: 386, goarm: "" }
          - { arch: armv7, platform: linux/arm/v7, goarch: arm, goarm: "7" }
          - { arch: armv6, platform: linux/arm/v6, goarch: arm, goarm: "6" }
    steps:
      - name: 克隆代码
        run: |
          git clone --depth 1 --branch ${{ env.UPSTREAM_STABLE_BRANCH }} \
            ${{ env.UPSTREAM_REPO }} .
          
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ~1.25.10
          
      - name: 编译二进制
        run: |
          VERSION="${{ needs.check_versions.outputs.stable_version }}"
          
          if [[ -f "release/DEFAULT_BUILD_TAGS_OTHERS" ]]; then
            TAGS=$(cat release/DEFAULT_BUILD_TAGS_OTHERS)
          else
            TAGS="with_gvisor,with_quic,with_wireguard,with_utls,with_acme,with_clash_api,with_stdjson,with_dhcp,with_v2ray_api,with_lite,with_ech"
          fi
          
          if [[ -f "release/LDFLAGS" ]]; then
            LDFLAGS=$(cat release/LDFLAGS)
          else
            LDFLAGS="-extldflags '-static'"
          fi
          
          GOARM="${{ matrix.goarm }}"
          CGO_ENABLED=0 GOOS=linux GOARCH=${{ matrix.goarch }} GOARM=${GOARM} \
            go build -v -trimpath -o sing-box-${{ matrix.arch }} \
            -tags "${TAGS}" \
            -ldflags "-X 'github.com/sagernet/sing-box/constant.Version=${VERSION}' ${LDFLAGS} -s -w -buildid=" \
            ./cmd/sing-box
          
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3
        
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: cary17
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          
      - name: 构建并推送镜像
        run: |
          VERSION="${{ needs.check_versions.outputs.stable_version }}"
          ARCH="${{ matrix.arch }}"
          
          docker buildx build \
            --platform ${{ matrix.platform }} \
            --build-arg TARGETARCH=${ARCH} \
            -t "${{ env.GHCR_IMAGE }}:${VERSION}-${ARCH}" \
            -t "cary17/sing-box:${VERSION}-${ARCH}" \
            --push \
            -f Dockerfile.binary .
          
      - name: 保存镜像标签
        run: |
          echo "STABLE_${ARCH}_DONE=true" >> $GITHUB_ENV

  # ==================== 合并稳定版镜像 ====================
  merge_stable:
    name: 合并稳定版多架构镜像
    runs-on: ubuntu-latest
    needs: [build_stable_amd64, build_stable_arm64, build_stable_other]
    if: needs.check_versions.outputs.stable_need_build == 'true'
    steps:
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: cary17
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          
      - name: 合并并推送 GHCR 镜像
        run: |
          VERSION="${{ needs.check_versions.outputs.stable_version }}"
          
          MANIFEST_ARGS=""
          for ARCH in amd64 arm64 386 armv7 armv6; do
            MANIFEST_ARGS="${MANIFEST_ARGS} ${{ env.GHCR_IMAGE }}:${VERSION}-${ARCH}"
          done
          
          docker manifest create "${{ env.GHCR_IMAGE }}:${VERSION}" ${MANIFEST_ARGS}
          docker manifest push "${{ env.GHCR_IMAGE }}:${VERSION}"
          
          docker manifest create "${{ env.GHCR_IMAGE }}:latest" ${MANIFEST_ARGS}
          docker manifest push "${{ env.GHCR_IMAGE }}:latest"
          
          echo "✅ GHCR 稳定版推送完成"
          
      - name: 合并并推送 Docker Hub 镜像
        run: |
          VERSION="${{ needs.check_versions.outputs.stable_version }}"
          
          MANIFEST_ARGS=""
          for ARCH in amd64 arm64 386 armv7 armv6; do
            MANIFEST_ARGS="${MANIFEST_ARGS} cary17/sing-box:${VERSION}-${ARCH}"
          done
          
          docker manifest create "cary17/sing-box:${VERSION}" ${MANIFEST_ARGS}
          docker manifest push "cary17/sing-box:${VERSION}"
          
          docker manifest create "cary17/sing-box:latest" ${MANIFEST_ARGS}
          docker manifest push "cary17/sing-box:latest"
          
          echo "✅ Docker Hub 稳定版推送完成"
          
      - name: 记录构建状态
        run: |
          echo "${{ needs.check_versions.outputs.stable_commit }}" > .last_stable_commit
          
      - name: 输出摘要
        run: |
          echo "## 🎉 稳定版构建完成" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 项目 | 信息 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| 版本 | ${{ needs.check_versions.outputs.stable_version }} |" >> $GITHUB_STEP_SUMMARY
          echo "| GHCR | \`${{ env.GHCR_IMAGE }}:${{ needs.check_versions.outputs.stable_version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker Hub | \`cary17/sing-box:${{ needs.check_versions.outputs.stable_version }}\` |" >> $GITHUB_STEP_SUMMARY

  # ==================== 构建测试版（简化版，复用稳定版逻辑）====================
  build_testing_amd64:
    name: 构建测试版 amd64
    runs-on: ubuntu-latest
    needs: check_versions
    if: needs.check_versions.outputs.testing_need_build == 'true'
    steps:
      - name: 克隆代码
        run: |
          git clone --depth 1 --branch ${{ env.UPSTREAM_TESTING_BRANCH }} \
            ${{ env.UPSTREAM_REPO }} .
          
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ~1.25.10
          
      - name: 编译二进制
        run: |
          VERSION="${{ needs.check_versions.outputs.testing_version }}"
          
          if [[ -f "release/DEFAULT_BUILD_TAGS_OTHERS" ]]; then
            TAGS=$(cat release/DEFAULT_BUILD_TAGS_OTHERS)
          else
            TAGS="with_gvisor,with_quic,with_wireguard,with_utls,with_acme,with_clash_api,with_stdjson,with_dhcp,with_v2ray_api,with_lite,with_ech"
          fi
          
          if [[ -f "release/LDFLAGS" ]]; then
            LDFLAGS=$(cat release/LDFLAGS)
          else
            LDFLAGS="-extldflags '-static'"
          fi
          
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go build -v -trimpath -o sing-box-amd64 \
            -tags "${TAGS}" \
            -ldflags "-X 'github.com/sagernet/sing-box/constant.Version=${VERSION}' ${LDFLAGS} -s -w -buildid=" \
            ./cmd/sing-box
          
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: cary17
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          
      - name: 构建并推送镜像
        run: |
          VERSION="${{ needs.check_versions.outputs.testing_version }}"
          
          docker build \
            --platform linux/amd64 \
            --build-arg TARGETARCH=amd64 \
            -t amd64-temp \
            -f Dockerfile.binary .
          
          docker tag amd64-temp "${{ env.GHCR_IMAGE }}:${VERSION}-amd64"
          docker push "${{ env.GHCR_IMAGE }}:${VERSION}-amd64"
          
          docker tag amd64-temp "cary17/sing-box:${VERSION}-amd64"
          docker push "cary17/sing-box:${VERSION}-amd64"

  build_testing_arm64:
    name: 构建测试版 arm64
    runs-on: ubuntu-24.04-arm
    needs: check_versions
    if: needs.check_versions.outputs.testing_need_build == 'true'
    steps:
      - name: 克隆代码
        run: |
          git clone --depth 1 --branch ${{ env.UPSTREAM_TESTING_BRANCH }} \
            ${{ env.UPSTREAM_REPO }} .
          
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ~1.25.10
          
      - name: 编译二进制
        run: |
          VERSION="${{ needs.check_versions.outputs.testing_version }}"
          
          if [[ -f "release/DEFAULT_BUILD_TAGS_OTHERS" ]]; then
            TAGS=$(cat release/DEFAULT_BUILD_TAGS_OTHERS)
          else
            TAGS="with_gvisor,with_quic,with_wireguard,with_utls,with_acme,with_clash_api,with_stdjson,with_dhcp,with_v2ray_api,with_lite,with_ech"
          fi
          
          if [[ -f "release/LDFLAGS" ]]; then
            LDFLAGS=$(cat release/LDFLAGS)
          else
            LDFLAGS="-extldflags '-static'"
          fi
          
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 \
            go build -v -trimpath -o sing-box-arm64 \
            -tags "${TAGS}" \
            -ldflags "-X 'github.com/sagernet/sing-box/constant.Version=${VERSION}' ${LDFLAGS} -s -w -buildid=" \
            ./cmd/sing-box
          
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: cary17
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          
      - name: 构建并推送镜像
        run: |
          VERSION="${{ needs.check_versions.outputs.testing_version }}"
          
          docker build \
            --platform linux/arm64 \
            --build-arg TARGETARCH=arm64 \
            -t arm64-temp \
            -f Dockerfile.binary .
          
          docker tag arm64-temp "${{ env.GHCR_IMAGE }}:${VERSION}-arm64"
          docker push "${{ env.GHCR_IMAGE }}:${VERSION}-arm64"
          
          docker tag arm64-temp "cary17/sing-box:${VERSION}-arm64"
          docker push "cary17/sing-box:${VERSION}-arm64"

  build_testing_other:
    name: 构建测试版 ${{ matrix.arch }}
    runs-on: ubuntu-latest
    needs: [check_versions, build_testing_amd64, build_testing_arm64]
    if: needs.check_versions.outputs.testing_need_build == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - { arch: 386, platform: linux/386, goarch: 386, goarm: "" }
          - { arch: armv7, platform: linux/arm/v7, goarch: arm, goarm: "7" }
          - { arch: armv6, platform: linux/arm/v6, goarch: arm, goarm: "6" }
    steps:
      - name: 克隆代码
        run: |
          git clone --depth 1 --branch ${{ env.UPSTREAM_TESTING_BRANCH }} \
            ${{ env.UPSTREAM_REPO }} .
          
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ~1.25.10
          
      - name: 编译二进制
        run: |
          VERSION="${{ needs.check_versions.outputs.testing_version }}"
          
          if [[ -f "release/DEFAULT_BUILD_TAGS_OTHERS" ]]; then
            TAGS=$(cat release/DEFAULT_BUILD_TAGS_OTHERS)
          else
            TAGS="with_gvisor,with_quic,with_wireguard,with_utls,with_acme,with_clash_api,with_stdjson,with_dhcp,with_v2ray_api,with_lite,with_ech"
          fi
          
          if [[ -f "release/LDFLAGS" ]]; then
            LDFLAGS=$(cat release/LDFLAGS)
          else
            LDFLAGS="-extldflags '-static'"
          fi
          
          GOARM="${{ matrix.goarm }}"
          CGO_ENABLED=0 GOOS=linux GOARCH=${{ matrix.goarch }} GOARM=${GOARM} \
            go build -v -trimpath -o sing-box-${{ matrix.arch }} \
            -tags "${TAGS}" \
            -ldflags "-X 'github.com/sagernet/sing-box/constant.Version=${VERSION}' ${LDFLAGS} -s -w -buildid=" \
            ./cmd/sing-box
          
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3
        
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: cary17
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          
      - name: 构建并推送镜像
        run: |
          VERSION="${{ needs.check_versions.outputs.testing_version }}"
          ARCH="${{ matrix.arch }}"
          
          docker buildx build \
            --platform ${{ matrix.platform }} \
            --build-arg TARGETARCH=${ARCH} \
            -t "${{ env.GHCR_IMAGE }}:${VERSION}-${ARCH}" \
            -t "cary17/sing-box:${VERSION}-${ARCH}" \
            --push \
            -f Dockerfile.binary .

  merge_testing:
    name: 合并测试版多架构镜像
    runs-on: ubuntu-latest
    needs: [build_testing_amd64, build_testing_arm64, build_testing_other]
    if: needs.check_versions.outputs.testing_need_build == 'true'
    steps:
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: cary17
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          
      - name: 合并并推送 GHCR 测试版镜像
        run: |
          VERSION="${{ needs.check_versions.outputs.testing_version }}"
          
          MANIFEST_ARGS=""
          for ARCH in amd64 arm64 386 armv7 armv6; do
            MANIFEST_ARGS="${MANIFEST_ARGS} ${{ env.GHCR_IMAGE }}:${VERSION}-${ARCH}"
          done
          
          docker manifest create "${{ env.GHCR_IMAGE }}:${VERSION}" ${MANIFEST_ARGS}
          docker manifest push "${{ env.GHCR_IMAGE }}:${VERSION}"
          
          echo "✅ GHCR 测试版推送完成"
          
      - name: 合并并推送 Docker Hub 测试版镜像
        run: |
          VERSION="${{ needs.check_versions.outputs.testing_version }}"
          
          MANIFEST_ARGS=""
          for ARCH in amd64 arm64 386 armv7 armv6; do
            MANIFEST_ARGS="${MANIFEST_ARGS} cary17/sing-box:${VERSION}-${ARCH}"
          done
          
          docker manifest create "cary17/sing-box:${VERSION}" ${MANIFEST_ARGS}
          docker manifest push "cary17/sing-box:${VERSION}"
          
          echo "✅ Docker Hub 测试版推送完成"
          
      - name: 记录构建状态
        run: |
          echo "${{ needs.check_versions.outputs.testing_commit }}" > .last_testing_commit
          
      - name: 输出摘要
        run: |
          echo "## 🎉 测试版构建完成" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 项目 | 信息 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| 版本 | ${{ needs.check_versions.outputs.testing_version }} |" >> $GITHUB_STEP_SUMMARY
          echo "| GHCR | \`${{ env.GHCR_IMAGE }}:${{ needs.check_versions.outputs.testing_version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker Hub | \`cary17/sing-box:${{ needs.check_versions.outputs.testing_version }}\` |" >> $GITHUB_STEP_SUMMARY
