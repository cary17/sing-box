name: Build reF1nd Sing-Box Docker Images

on:
  schedule:
    # 每4小时检测一次上游更新
    - cron: "0 */4 * * *"
  workflow_dispatch:
    inputs:
      force_build:
        description: "强制构建"
        required: false
        default: false
        type: boolean
      branch:
        description: "选择分支"
        required: false
        default: "both"
        type: choice
        options:
          - both
          - stable
          - testing

env:
  # 上游仓库配置
  UPSTREAM_REPO: "https://github.com/reF1nd/sing-box.git"
  UPSTREAM_STABLE_BRANCH: "reF1nd-stable"
  UPSTREAM_TESTING_BRANCH: "reF1nd-testing"
  
  # 镜像仓库配置
  GHCR_IMAGE: "ghcr.io/${{ github.repository_owner }}/sing-box"
  DOCKERHUB_IMAGE: "${{ secrets.DOCKERHUB_USERNAME }}/sing-box"
  
  # 支持的架构（排除 riscv64）
  SUPPORTED_ARCHS: "amd64 arm64 386 armv7 armv6 ppc64le s390x"

jobs:
  # ==================== 构建稳定版 ====================
  build_stable:
    name: 构建稳定版镜像
    runs-on: ubuntu-latest
    if: |
      github.event.inputs.branch == 'stable' || 
      github.event.inputs.branch == 'both' || 
      github.event_name == 'schedule'
    steps:
      - name: 检测上游更新
        id: check_update
        run: |
          echo "🔍 检查上游 ${{ env.UPSTREAM_STABLE_BRANCH }} 分支..."
          
          LATEST_COMMIT=$(git ls-remote ${{ env.UPSTREAM_REPO }} \
            refs/heads/${{ env.UPSTREAM_STABLE_BRANCH }} | awk '{print $1}')
          echo "latest_commit=${LATEST_COMMIT}" >> $GITHUB_OUTPUT
          
          if [[ -f ".last_stable_commit" ]]; then
            LAST_COMMIT=$(cat .last_stable_commit)
          else
            LAST_COMMIT=""
          fi
          
          if [[ "${{ github.event.inputs.force_build }}" == "true" ]] || [[ "$LATEST_COMMIT" != "$LAST_COMMIT" ]]; then
            echo "need_build=true" >> $GITHUB_OUTPUT
            echo "🆕 需要构建"
          else
            echo "need_build=false" >> $GITHUB_OUTPUT
            echo "✅ 无更新，跳过构建"
          fi
          
      - name: 克隆上游代码
        if: steps.check_update.outputs.need_build == 'true'
        run: |
          echo "📦 克隆 ${{ env.UPSTREAM_STABLE_BRANCH }} 分支代码..."
          git clone --depth 1 --branch ${{ env.UPSTREAM_STABLE_BRANCH }} \
            ${{ env.UPSTREAM_REPO }} .
          COMMIT=$(git rev-parse --short HEAD)
          echo "COMMIT_HASH=${COMMIT}" >> $GITHUB_ENV
          echo "✅ 克隆完成，commit: ${COMMIT}"
          
      - name: 获取版本号
        id: version
        if: steps.check_update.outputs.need_build == 'true'
        run: |
          TAG=$(git describe --tags --abbrev=0 2>/dev/null | sed 's/-reF1nd$//' || echo "")
          if [[ -n "$TAG" ]]; then
            VERSION="$TAG"
            echo "🏷️ 使用 tag 版本: ${VERSION}"
          else
            VERSION="stable-${COMMIT_HASH}"
            echo "🏷️ 使用 commit 版本: ${VERSION}"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          
      - name: Setup Go
        if: steps.check_update.outputs.need_build == 'true'
        uses: actions/setup-go@v5
        with:
          go-version: ~1.25.10
          
      - name: 编译所有架构二进制文件
        if: steps.check_update.outputs.need_build == 'true'
        run: |
          echo "🔨 开始编译二进制文件..."
          
          VERSION="${{ steps.version.outputs.version }}"
          
          # 获取构建标签
          if [[ -f "release/DEFAULT_BUILD_TAGS_OTHERS" ]]; then
            TAGS=$(cat release/DEFAULT_BUILD_TAGS_OTHERS)
          else
            TAGS="with_gvisor,with_quic,with_wireguard,with_utls,with_acme,with_clash_api,with_stdjson,with_dhcp,with_v2ray_api,with_lite,with_ech"
          fi
          
          # 获取链接标志
          if [[ -f "release/LDFLAGS" ]]; then
            LDFLAGS=$(cat release/LDFLAGS)
          else
            LDFLAGS="-extldflags '-static'"
          fi
          
          # 编译各架构
          for ARCH in amd64 arm64 386 armv7 armv6 ppc64le s390x; do
            echo "编译架构: ${ARCH}"
            
            GOARCH="$ARCH"
            GOARM=""
            
            case "$ARCH" in
              armv7)
                GOARCH="arm"
                GOARM="7"
                ;;
              armv6)
                GOARCH="arm"
                GOARM="6"
                ;;
            esac
            
            CGO_ENABLED=0 GOOS=linux GOARCH=${GOARCH} GOARM=${GOARM} \
              go build -v -trimpath -o sing-box-${ARCH} \
              -tags "${TAGS}" \
              -ldflags "-X 'github.com/sagernet/sing-box/constant.Version=${VERSION}' ${LDFLAGS} -s -w -buildid=" \
              ./cmd/sing-box
              
            if [[ -f "sing-box-${ARCH}" ]]; then
              echo "✅ 完成: sing-box-${ARCH}"
            else
              echo "❌ 失败: sing-box-${ARCH}"
              exit 1
            fi
          done
          
          echo "📦 所有架构编译完成"
          
      - name: Setup Docker Buildx
        if: steps.check_update.outputs.need_build == 'true'
        uses: docker/setup-buildx-action@v3
        
      - name: Login to GHCR
        if: steps.check_update.outputs.need_build == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Login to Docker Hub
        if: steps.check_update.outputs.need_build == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          
      - name: 构建并推送稳定版镜像
        if: steps.check_update.outputs.need_build == 'true'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          echo "🔨 开始构建稳定版镜像..."
          echo "   版本: ${VERSION}"
          
          # 架构映射
          declare -A ARCH_MAP=(
            ["amd64"]="linux/amd64"
            ["arm64"]="linux/arm64"
            ["386"]="linux/386"
            ["armv7"]="linux/arm/v7"
            ["armv6"]="linux/arm/v6"
            ["ppc64le"]="linux/ppc64le"
            ["s390x"]="linux/s390x"
          )
          
          # 为每个架构构建镜像并推送
          for ARCH in amd64 arm64 386 armv7 armv6 ppc64le s390x; do
            PLATFORM="${ARCH_MAP[$ARCH]}"
            echo "构建 ${PLATFORM}..."
            
            docker build \
              --platform ${PLATFORM} \
              --build-arg TARGETARCH=${ARCH} \
              -t ${ARCH}-temp \
              -f Dockerfile.binary .
            
            # 推送到 GHCR
            docker tag ${ARCH}-temp ${{ env.GHCR_IMAGE }}:${VERSION}-${ARCH}
            docker push ${{ env.GHCR_IMAGE }}:${VERSION}-${ARCH}
            
            # 推送到 Docker Hub
            docker tag ${ARCH}-temp ${{ env.DOCKERHUB_IMAGE }}:${VERSION}-${ARCH}
            docker push ${{ env.DOCKERHUB_IMAGE }}:${VERSION}-${ARCH}
            
            echo "✅ ${PLATFORM} 完成"
          done
          
          # 创建 manifest 并推送
          MANIFEST_ARGS=""
          for ARCH in amd64 arm64 386 armv7 armv6 ppc64le s390x; do
            MANIFEST_ARGS="${MANIFEST_ARGS} ${{ env.GHCR_IMAGE }}:${VERSION}-${ARCH}"
          done
          
          # GHCR: 版本标签
          docker manifest create ${{ env.GHCR_IMAGE }}:${VERSION} ${MANIFEST_ARGS}
          docker manifest push ${{ env.GHCR_IMAGE }}:${VERSION}
          
          # GHCR: latest 标签（仅稳定版）
          docker manifest create ${{ env.GHCR_IMAGE }}:latest ${MANIFEST_ARGS}
          docker manifest push ${{ env.GHCR_IMAGE }}:latest
          
          # Docker Hub manifest
          MANIFEST_ARGS=""
          for ARCH in amd64 arm64 386 armv7 armv6 ppc64le s390x; do
            MANIFEST_ARGS="${MANIFEST_ARGS} ${{ env.DOCKERHUB_IMAGE }}:${VERSION}-${ARCH}"
          done
          
          # Docker Hub: 版本标签
          docker manifest create ${{ env.DOCKERHUB_IMAGE }}:${VERSION} ${MANIFEST_ARGS}
          docker manifest push ${{ env.DOCKERHUB_IMAGE }}:${VERSION}
          
          # Docker Hub: latest 标签（仅稳定版）
          docker manifest create ${{ env.DOCKERHUB_IMAGE }}:latest ${MANIFEST_ARGS}
          docker manifest push ${{ env.DOCKERHUB_IMAGE }}:latest
          
          echo "✅ 稳定版镜像推送完成"
          echo "   ${{ env.GHCR_IMAGE }}:${VERSION}"
          echo "   ${{ env.GHCR_IMAGE }}:latest"
          echo "   ${{ env.DOCKERHUB_IMAGE }}:${VERSION}"
          echo "   ${{ env.DOCKERHUB_IMAGE }}:latest"
          
      - name: 记录构建状态
        if: steps.check_update.outputs.need_build == 'true'
        run: |
          echo "${{ steps.check_update.outputs.latest_commit }}" > .last_stable_commit
          echo "✅ 已记录构建 commit"

  # ==================== 构建测试版 ====================
  build_testing:
    name: 构建测试版镜像
    runs-on: ubuntu-latest
    if: |
      github.event.inputs.branch == 'testing' || 
      github.event.inputs.branch == 'both' || 
      github.event_name == 'schedule'
    steps:
      - name: 检测上游更新
        id: check_update
        run: |
          echo "🔍 检查上游 ${{ env.UPSTREAM_TESTING_BRANCH }} 分支..."
          
          LATEST_COMMIT=$(git ls-remote ${{ env.UPSTREAM_REPO }} \
            refs/heads/${{ env.UPSTREAM_TESTING_BRANCH }} | awk '{print $1}')
          echo "latest_commit=${LATEST_COMMIT}" >> $GITHUB_OUTPUT
          
          if [[ -f ".last_testing_commit" ]]; then
            LAST_COMMIT=$(cat .last_testing_commit)
          else
            LAST_COMMIT=""
          fi
          
          if [[ "${{ github.event.inputs.force_build }}" == "true" ]] || [[ "$LATEST_COMMIT" != "$LAST_COMMIT" ]]; then
            echo "need_build=true" >> $GITHUB_OUTPUT
            echo "🆕 需要构建"
          else
            echo "need_build=false" >> $GITHUB_OUTPUT
            echo "✅ 无更新，跳过构建"
          fi
          
      - name: 克隆上游代码
        if: steps.check_update.outputs.need_build == 'true'
        run: |
          echo "📦 克隆 ${{ env.UPSTREAM_TESTING_BRANCH }} 分支代码..."
          git clone --depth 1 --branch ${{ env.UPSTREAM_TESTING_BRANCH }} \
            ${{ env.UPSTREAM_REPO }} .
          COMMIT=$(git rev-parse --short HEAD)
          echo "COMMIT_HASH=${COMMIT}" >> $GITHUB_ENV
          echo "✅ 克隆完成，commit: ${COMMIT}"
          
      - name: 获取版本号（测试版只去掉 -reF1nd，不添加额外标签）
        id: version
        if: steps.check_update.outputs.need_build == 'true'
        run: |
          TAG=$(git describe --tags --abbrev=0 2>/dev/null | sed 's/-reF1nd$//' || echo "")
          if [[ -n "$TAG" ]]; then
            VERSION="$TAG"
            echo "🏷️ 使用 tag 版本: ${VERSION}"
          else
            VERSION="${COMMIT_HASH}"
            echo "🏷️ 使用 commit 版本: ${VERSION}"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          
      - name: Setup Go
        if: steps.check_update.outputs.need_build == 'true'
        uses: actions/setup-go@v5
        with:
          go-version: ~1.25.10
          
      - name: 编译所有架构二进制文件
        if: steps.check_update.outputs.need_build == 'true'
        run: |
          echo "🔨 开始编译测试版二进制文件..."
          
          VERSION="${{ steps.version.outputs.version }}"
          
          if [[ -f "release/DEFAULT_BUILD_TAGS_OTHERS" ]]; then
            TAGS=$(cat release/DEFAULT_BUILD_TAGS_OTHERS)
          else
            TAGS="with_gvisor,with_quic,with_wireguard,with_utls,with_acme,with_clash_api,with_stdjson,with_dhcp,with_v2ray_api,with_lite,with_ech"
          fi
          
          if [[ -f "release/LDFLAGS" ]]; then
            LDFLAGS=$(cat release/LDFLAGS)
          else
            LDFLAGS="-extldflags '-static'"
          fi
          
          for ARCH in amd64 arm64 386 armv7 armv6 ppc64le s390x; do
            echo "编译架构: ${ARCH}"
            
            GOARCH="$ARCH"
            GOARM=""
            
            case "$ARCH" in
              armv7)
                GOARCH="arm"
                GOARM="7"
                ;;
              armv6)
                GOARCH="arm"
                GOARM="6"
                ;;
            esac
            
            CGO_ENABLED=0 GOOS=linux GOARCH=${GOARCH} GOARM=${GOARM} \
              go build -v -trimpath -o sing-box-${ARCH} \
              -tags "${TAGS}" \
              -ldflags "-X 'github.com/sagernet/sing-box/constant.Version=${VERSION}' ${LDFLAGS} -s -w -buildid=" \
              ./cmd/sing-box
              
            if [[ -f "sing-box-${ARCH}" ]]; then
              echo "✅ 完成: sing-box-${ARCH}"
            else
              echo "❌ 失败: sing-box-${ARCH}"
              exit 1
            fi
          done
          
      - name: Setup Docker Buildx
        if: steps.check_update.outputs.need_build == 'true'
        uses: docker/setup-buildx-action@v3
        
      - name: Login to GHCR
        if: steps.check_update.outputs.need_build == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Login to Docker Hub
        if: steps.check_update.outputs.need_build == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          
      - name: 构建并推送测试版镜像（只有版本标签）
        if: steps.check_update.outputs.need_build == 'true'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          echo "🔨 开始构建测试版镜像..."
          echo "   版本: ${VERSION}"
          
          declare -A ARCH_MAP=(
            ["amd64"]="linux/amd64"
            ["arm64"]="linux/arm64"
            ["386"]="linux/386"
            ["armv7"]="linux/arm/v7"
            ["armv6"]="linux/arm/v6"
            ["ppc64le"]="linux/ppc64le"
            ["s390x"]="linux/s390x"
          )
          
          for ARCH in amd64 arm64 386 armv7 armv6 ppc64le s390x; do
            PLATFORM="${ARCH_MAP[$ARCH]}"
            echo "构建 ${PLATFORM}..."
            
            docker build \
              --platform ${PLATFORM} \
              --build-arg TARGETARCH=${ARCH} \
              -t ${ARCH}-temp \
              -f Dockerfile.binary .
            
            docker tag ${ARCH}-temp ${{ env.GHCR_IMAGE }}:${VERSION}-${ARCH}
            docker push ${{ env.GHCR_IMAGE }}:${VERSION}-${ARCH}
            
            docker tag ${ARCH}-temp ${{ env.DOCKERHUB_IMAGE }}:${VERSION}-${ARCH}
            docker push ${{ env.DOCKERHUB_IMAGE }}:${VERSION}-${ARCH}
          done
          
          # 创建 manifest（只有版本标签，没有 latest 或 stable 标签）
          MANIFEST_ARGS=""
          for ARCH in amd64 arm64 386 armv7 armv6 ppc64le s390x; do
            MANIFEST_ARGS="${MANIFEST_ARGS} ${{ env.GHCR_IMAGE }}:${VERSION}-${ARCH}"
          done
          
          # GHCR: 版本标签
          docker manifest create ${{ env.GHCR_IMAGE }}:${VERSION} ${MANIFEST_ARGS}
          docker manifest push ${{ env.GHCR_IMAGE }}:${VERSION}
          
          # Docker Hub: 版本标签
          MANIFEST_ARGS=""
          for ARCH in amd64 arm64 386 armv7 armv6 ppc64le s390x; do
            MANIFEST_ARGS="${MANIFEST_ARGS} ${{ env.DOCKERHUB_IMAGE }}:${VERSION}-${ARCH}"
          done
          
          docker manifest create ${{ env.DOCKERHUB_IMAGE }}:${VERSION} ${MANIFEST_ARGS}
          docker manifest push ${{ env.DOCKERHUB_IMAGE }}:${VERSION}
          
          echo "✅ 测试版镜像推送完成（仅版本标签）"
          echo "   ${{ env.GHCR_IMAGE }}:${VERSION}"
          echo "   ${{ env.DOCKERHUB_IMAGE }}:${VERSION}"
          
      - name: 记录构建状态
        if: steps.check_update.outputs.need_build == 'true'
        run: |
          echo "${{ steps.check_update.outputs.latest_commit }}" > .last_testing_commit
          echo "✅ 已记录构建 commit"
