name: Build reF1nd Sing-Box Docker Images

on:
  schedule:
    # 每4小时检测一次上游更新
    - cron: "0 */4 * * *"
  workflow_dispatch:
    inputs:
      force_build:
        description: "强制构建"
        required: false
        default: false
        type: boolean
      branch:
        description: "选择分支"
        required: false
        default: "both"
        type: choice
        options:
          - both
          - stable
          - testing

env:
  # 上游仓库配置
  UPSTREAM_REPO: "https://github.com/reF1nd/sing-box.git"
  UPSTREAM_STABLE_BRANCH: "reF1nd-stable"
  UPSTREAM_TESTING_BRANCH: "reF1nd-testing"
  
  # 镜像仓库配置
  GHCR_IMAGE: "ghcr.io/${{ github.repository_owner }}/sing-box"
  DOCKERHUB_IMAGE: "cary17/sing-box"

jobs:
  # ==================== 检测版本 ====================
  check_versions:
    name: 检测上游版本
    runs-on: ubuntu-latest
    outputs:
      stable_version: ${{ steps.stable_version.outputs.version }}
      testing_version: ${{ steps.testing_version.outputs.version }}
      stable_need_build: ${{ steps.stable_check.outputs.need_build }}
      testing_need_build: ${{ steps.testing_check.outputs.need_build }}
      stable_commit: ${{ steps.stable_commit.outputs.commit }}
      testing_commit: ${{ steps.testing_commit.outputs.commit }}
    steps:
      - name: 获取稳定版信息
        id: stable_commit
        run: |
          COMMIT=$(git ls-remote ${{ env.UPSTREAM_REPO }} \
            refs/heads/${{ env.UPSTREAM_STABLE_BRANCH }} | awk '{print $1}')
          echo "commit=${COMMIT}" >> $GITHUB_OUTPUT
          echo "稳定版最新 commit: ${COMMIT}"
          
      - name: 获取稳定版版本号
        id: stable_version
        run: |
          git clone --depth 1 --branch ${{ env.UPSTREAM_STABLE_BRANCH }} \
            ${{ env.UPSTREAM_REPO }} /tmp/stable
          cd /tmp/stable
          TAG=$(git describe --tags --abbrev=0 2>/dev/null | sed 's/-reF1nd$//' || echo "")
          if [[ -n "$TAG" ]]; then
            VERSION="$TAG"
          else
            VERSION="stable-$(git rev-parse --short HEAD)"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "稳定版版本号: ${VERSION}"
          
      - name: 检查稳定版是否需要构建
        id: stable_check
        run: |
          NEED="false"
          if [[ "${{ github.event.inputs.force_build }}" == "true" ]] || \
             [[ "${{ github.event.inputs.branch }}" == "stable" ]] || \
             [[ "${{ github.event.inputs.branch }}" == "both" ]]; then
            NEED="true"
            echo "强制构建稳定版"
          elif [[ -f ".last_stable_commit" ]]; then
            LAST=$(cat .last_stable_commit)
            CURRENT="${{ steps.stable_commit.outputs.commit }}"
            if [[ "$CURRENT" != "$LAST" ]]; then
              NEED="true"
              echo "检测到稳定版更新: ${CURRENT:0:8}"
            else
              echo "稳定版无更新"
            fi
          else
            NEED="true"
            echo "首次构建稳定版"
          fi
          echo "need_build=${NEED}" >> $GITHUB_OUTPUT
          
      - name: 获取测试版信息
        id: testing_commit
        run: |
          COMMIT=$(git ls-remote ${{ env.UPSTREAM_REPO }} \
            refs/heads/${{ env.UPSTREAM_TESTING_BRANCH }} | awk '{print $1}')
          echo "commit=${COMMIT}" >> $GITHUB_OUTPUT
          echo "测试版最新 commit: ${COMMIT}"
          
      - name: 获取测试版版本号
        id: testing_version
        run: |
          git clone --depth 1 --branch ${{ env.UPSTREAM_TESTING_BRANCH }} \
            ${{ env.UPSTREAM_REPO }} /tmp/testing
          cd /tmp/testing
          TAG=$(git describe --tags --abbrev=0 2>/dev/null | sed 's/-reF1nd$//' || echo "")
          if [[ -n "$TAG" ]]; then
            VERSION="$TAG"
          else
            VERSION="$(git rev-parse --short HEAD)"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "测试版版本号: ${VERSION}"
          
      - name: 检查测试版是否需要构建
        id: testing_check
        run: |
          NEED="false"
          if [[ "${{ github.event.inputs.force_build }}" == "true" ]] || \
             [[ "${{ github.event.inputs.branch }}" == "testing" ]] || \
             [[ "${{ github.event.inputs.branch }}" == "both" ]]; then
            NEED="true"
            echo "强制构建测试版"
          elif [[ -f ".last_testing_commit" ]]; then
            LAST=$(cat .last_testing_commit)
            CURRENT="${{ steps.testing_commit.outputs.commit }}"
            if [[ "$CURRENT" != "$LAST" ]]; then
              NEED="true"
              echo "检测到测试版更新: ${CURRENT:0:8}"
            else
              echo "测试版无更新"
            fi
          else
            NEED="true"
            echo "首次构建测试版"
          fi
          echo "need_build=${NEED}" >> $GITHUB_OUTPUT

  # ==================== 构建稳定版 ====================
  build_stable:
    name: 构建稳定版镜像
    runs-on: ubuntu-latest
    needs: check_versions
    if: needs.check_versions.outputs.stable_need_build == 'true'
    steps:
      - name: 克隆上游代码
        run: |
          echo "📦 克隆 ${{ env.UPSTREAM_STABLE_BRANCH }} 分支..."
          git clone --depth 1 --branch ${{ env.UPSTREAM_STABLE_BRANCH }} \
            ${{ env.UPSTREAM_REPO }} .
          echo "✅ 代码克隆完成"
          
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3
        
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: cary17
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          
      - name: 构建并推送稳定版多架构镜像
        run: |
          VERSION="${{ needs.check_versions.outputs.stable_version }}"
          echo "🔨 开始构建稳定版多架构镜像..."
          echo "   版本: ${VERSION}"
          echo "   架构: linux/amd64, linux/arm64, linux/386, linux/arm/v7, linux/arm/v6"
          
          # 稳定版：推送版本标签 + latest 标签
          docker buildx build \
            --platform linux/amd64,linux/arm64,linux/386,linux/arm/v7,linux/arm/v6 \
            -t "${{ env.GHCR_IMAGE }}:${VERSION}" \
            -t "${{ env.GHCR_IMAGE }}:latest" \
            -t "${{ env.DOCKERHUB_IMAGE }}:${VERSION}" \
            -t "${{ env.DOCKERHUB_IMAGE }}:latest" \
            --push \
            -f Dockerfile.binary .
          
          echo "✅ 稳定版镜像推送完成"
          echo "   ${{ env.GHCR_IMAGE }}:${VERSION}"
          echo "   ${{ env.GHCR_IMAGE }}:latest"
          echo "   ${{ env.DOCKERHUB_IMAGE }}:${VERSION}"
          echo "   ${{ env.DOCKERHUB_IMAGE }}:latest"
          
      - name: 记录构建状态
        run: |
          echo "${{ needs.check_versions.outputs.stable_commit }}" > .last_stable_commit
          echo "✅ 已记录稳定版构建 commit"
          
      - name: 构建摘要
        run: |
          echo "## 🎉 稳定版构建完成" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 项目 | 信息 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| 版本 | ${{ needs.check_versions.outputs.stable_version }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 架构 | amd64, arm64, 386, arm/v7, arm/v6 |" >> $GITHUB_STEP_SUMMARY
          echo "| GHCR | \`${{ env.GHCR_IMAGE }}:${{ needs.check_versions.outputs.stable_version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker Hub | \`${{ env.DOCKERHUB_IMAGE }}:${{ needs.check_versions.outputs.stable_version }}\` |" >> $GITHUB_STEP_SUMMARY

  # ==================== 构建测试版 ====================
  build_testing:
    name: 构建测试版镜像
    runs-on: ubuntu-latest
    needs: check_versions
    if: needs.check_versions.outputs.testing_need_build == 'true'
    steps:
      - name: 克隆上游代码
        run: |
          echo "📦 克隆 ${{ env.UPSTREAM_TESTING_BRANCH }} 分支..."
          git clone --depth 1 --branch ${{ env.UPSTREAM_TESTING_BRANCH }} \
            ${{ env.UPSTREAM_REPO }} .
          echo "✅ 代码克隆完成"
          
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3
        
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: cary17
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          
      - name: 构建并推送测试版多架构镜像
        run: |
          VERSION="${{ needs.check_versions.outputs.testing_version }}"
          echo "🔨 开始构建测试版多架构镜像..."
          echo "   版本: ${VERSION}"
          echo "   架构: linux/amd64, linux/arm64, linux/386, linux/arm/v7, linux/arm/v6"
          
          # 测试版：只推送版本标签，不推送 latest
          docker buildx build \
            --platform linux/amd64,linux/arm64,linux/386,linux/arm/v7,linux/arm/v6 \
            -t "${{ env.GHCR_IMAGE }}:${VERSION}" \
            -t "${{ env.DOCKERHUB_IMAGE }}:${VERSION}" \
            --push \
            -f Dockerfile.binary .
          
          echo "✅ 测试版镜像推送完成"
          echo "   ${{ env.GHCR_IMAGE }}:${VERSION}"
          echo "   ${{ env.DOCKERHUB_IMAGE }}:${VERSION}"
          
      - name: 记录构建状态
        run: |
          echo "${{ needs.check_versions.outputs.testing_commit }}" > .last_testing_commit
          echo "✅ 已记录测试版构建 commit"
          
      - name: 构建摘要
        run: |
          echo "## 🎉 测试版构建完成" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 项目 | 信息 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| 版本 | ${{ needs.check_versions.outputs.testing_version }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 架构 | amd64, arm64, 386, arm/v7, arm/v6 |" >> $GITHUB_STEP_SUMMARY
          echo "| GHCR | \`${{ env.GHCR_IMAGE }}:${{ needs.check_versions.outputs.testing_version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker Hub | \`${{ env.DOCKERHUB_IMAGE }}:${{ needs.check_versions.outputs.testing_version }}\` |" >> $GITHUB_STEP_SUMMARY
